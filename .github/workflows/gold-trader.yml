name: 🥇 Gold Momentum Trader

on:
  schedule:
    # 每 2 分钟触发（欧盘 15:00 - 美盘 02:00 北京时间）
    - cron: '*/2 0-17 * * 1-5'   # UTC 0-17 = 北京时间 8:00-01:00
    - cron: '*/2 18-23 * * 0-6'  # UTC 18-23 周末也覆盖
  # 也允许手动触发
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Engine
        env:
          TTFUND_APIKEY: ${{ secrets.TTFUND_APIKEY }}
        run: python3 -u gold_momentum_engine.py cloud

      - name: Commit state (if changed)
        if: always()
        run: |
          if [ -f gold_engine_state.json ]; then
            git config user.name "gold-trader-bot"
            git config user.email "bot@gold-trader.local"
            git add gold_engine_state.json
            if git diff --staged --quiet; then
              echo "State unchanged"
            else
              git commit -m "📊 auto: update engine state [skip ci]"
              git push
            fi
          fi

name: 🥇 Gold Momentum Trader

on:
  schedule:
    # 每分钟触发（北京时间 08:00-02:00 = UTC 00:00-18:00）
    - cron: '* 0-17 * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Engine
        env:
          TTFUND_APIKEY: ${{ secrets.TTFUND_APIKEY }}
        run: python3 -u gold_momentum_engine.py cloud

      - name: Commit state
        if: always()
        run: |
          if [ -f gold_engine_state.json ]; then
            git config user.name "gold-trader-bot"
            git config user.email "bot@gold-trader.local"
            git add gold_engine_state.json
            if git diff --staged --quiet; then
              echo "State unchanged"
            else
              git commit -m "📊 auto: update engine state [skip ci]"
              git push
            fi
          fi
